<!-- components/tab_nav.html -->
<!-- 하단 탭 바: 홈, 예약, 학습, 메시지, MY -->
{% set path = request.url.path if request else '' %}
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-gray-200 z-50">
  <div class="flex py-1.5 px-2">

    <a href="/booking/" class="tab {{ 'on' if path == '/booking/' }} flex-1 flex flex-col items-center gap-0.5 py-1.5">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="text-[10px]">홈</span>
    </a>

    <a href="/booking/calendar" class="tab {{ 'on' if '/calendar' in path or '/repeat' in path or '/confirm' in path or '/complete' in path or '/my-bookings' in path }} flex-1 flex flex-col items-center gap-0.5 py-1.5">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
      <span class="text-[10px]">예약</span>
    </a>

    <a href="/booking/dashboard" class="tab {{ 'on' if '/dashboard' in path }} flex-1 flex flex-col items-center gap-0.5 py-1.5">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg>
      <span class="text-[10px]">학습</span>
    </a>

    <a href="/message/" class="tab {{ 'on' if '/message' in path }} flex-1 flex flex-col items-center gap-0.5 py-1.5 relative">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
      {% if unread_count is defined and unread_count and unread_count > 0 %}
      <div class="absolute top-0.5 right-1/4 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white font-bold flex items-center justify-center">{{ unread_count }}</div>
      {% endif %}
      <span class="text-[10px]">메시지</span>
    </a>

    <a href="/booking/mypage" class="tab {{ 'on' if '/mypage' in path }} flex-1 flex flex-col items-center gap-0.5 py-1.5">
      <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="text-[10px]">MY</span>
    </a>

  </div>
</nav>
