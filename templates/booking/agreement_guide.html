<!-- templates/booking/agreement_guide.html -->
<!-- 화면: 전자서명 필요 안내 (3초 카운트다운 후 자동 이동) -->
{% extends "base.html" %}

{% block title %}계약서 서명 안내 - 케빈샘AI코딩학원{% endblock %}

{% block tabbar %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-white flex flex-col items-center justify-center px-6">

  <!-- 아이콘 -->
  <div class="w-20 h-20 bg-nv-50 rounded-full flex items-center justify-center mb-6">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#43A047" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
  </div>

  <!-- 안내 메시지 -->
  <h1 class="text-[20px] font-bold text-g-800 mb-2 text-center">교육 서비스 이용 계약서</h1>
  <p class="text-[14px] text-g-500 text-center leading-relaxed mb-2">
    수업을 시작하기 전에<br>
    <strong class="text-g-700">교육 서비스 이용 계약서</strong>에 동의가 필요합니다.
  </p>

  <!-- 카운트다운 -->
  <div class="mt-6 flex flex-col items-center" x-data="{ count: 3 }" x-init="
    let timer = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = '/booking/agreement/';
      }
    }, 1000)
  ">
    <div class="w-14 h-14 rounded-full border-4 border-nv-500 flex items-center justify-center mb-3">
      <span class="text-[24px] font-bold text-nv-600" x-text="count"></span>
    </div>
    <p class="text-[13px] text-g-400">잠시 후 계약서 페이지로 이동합니다</p>
  </div>

  <!-- 바로 이동 버튼 -->
  <a href="/booking/agreement/"
     class="mt-8 w-full max-w-[280px] py-3 rounded-xl font-medium text-white text-center
            bg-nv-600 active:bg-nv-700 transition-colors text-[15px]">
    바로 이동
  </a>

</div>
{% endblock %}
