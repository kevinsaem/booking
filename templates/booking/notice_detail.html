<!-- templates/booking/notice_detail.html -->
{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-g-100 pb-20 fade">

  <!-- 헤더 -->
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <a href="/booking/notices" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <h1 class="text-[16px] font-bold text-g-800">공지사항</h1>
  </div>

  <div class="px-4 pt-4">
    {% if notice %}
    <div class="card p-5">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-[9px] font-bold px-2 py-0.5 rounded-md text-g-500 bg-g-100">공지</span>
        <span class="text-[11px] text-g-400">{{ (notice.date or '')[:10] }}</span>
      </div>
      <h2 class="text-[18px] font-bold text-g-900 mb-4">{{ notice.title }}</h2>
      <p class="text-[14px] text-g-600 leading-relaxed whitespace-pre-line">{{ notice.content }}</p>
    </div>
    {% else %}
    <div class="card p-8 text-center text-g-400">
      <p>공지사항을 찾을 수 없습니다</p>
    </div>
    {% endif %}
  </div>

</div>
{% endblock %}
