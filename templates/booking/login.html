<!-- templates/booking/login.html -->
{% extends "base.html" %}

{% block title %}로그인 - 케빈샘랩{% endblock %}

{% block tabbar %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-white flex flex-col px-6 fade">

  <div class="flex-1 flex flex-col justify-center">
    <!-- 로고 -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-nv-600 rounded-2xl mb-4 shadow-lg shadow-nv-600/20">
        <span class="text-white font-extrabold text-2xl">K</span>
      </div>
      <h1 class="text-[22px] font-extrabold text-g-900">케빈샘랩</h1>
      <p class="text-[13px] text-g-500 mt-1">성인 1:1 AI활용 과정</p>
    </div>

    {% if error %}
    <p class="text-xs text-red-500 text-center mb-4">{{ error }}</p>
    {% endif %}

    <!-- 이름 + 인증번호 로그인 -->
    <form method="POST" action="/booking/login"
          x-data="{ name: '', code: '', clientErr: '' }"
          @submit="
            if (!name.trim()) { clientErr = '이름을 입력하세요'; $event.preventDefault(); return; }
            if (code.length < 4) { clientErr = '비밀번호를 입력하세요'; $event.preventDefault(); return; }
            clientErr = '';
          "
          class="space-y-3">
      <input type="text" name="name" x-model="name"
             placeholder="이름"
             class="w-full h-[44px] px-4 bg-g-100 rounded-xl text-[14px] placeholder-g-400">
      <input type="password" name="code" x-model="code"
             placeholder="비밀번호"
             class="w-full h-[44px] px-4 bg-g-100 rounded-xl text-[14px] placeholder-g-400">
      <p x-show="clientErr" x-text="clientErr" class="text-xs text-red-500 text-center"></p>
      <button type="submit" class="w-full h-[44px] bg-g-800 text-white rounded-xl font-bold text-[14px] active:bg-g-900">로그인</button>
    </form>

    <!-- 회원가입 - 캠퍼스 선택 -->
    <div x-data="{ showCampus: false }" class="mt-3">
      <button @click="showCampus = !showCampus"
              class="w-full h-[44px] border border-g-300 text-g-700 rounded-xl font-bold text-[14px] flex items-center justify-center active:bg-g-50 transition-all">
        회원가입
      </button>
      <div x-show="showCampus" x-cloak class="mt-2 space-y-2">
        <a href="/booking/signup?edc_idx=0"
           class="w-full h-[44px] bg-nv-50 border border-nv-200 text-nv-700 rounded-xl font-medium text-[14px] flex items-center justify-center active:bg-nv-100 transition-all">
          📍 선부캠퍼스
        </a>
        <a href="/booking/signup?edc_idx=1"
           class="w-full h-[44px] bg-nv-50 border border-nv-200 text-nv-700 rounded-xl font-medium text-[14px] flex items-center justify-center active:bg-nv-100 transition-all">
          📍 초지캠퍼스
        </a>
      </div>
    </div>

    <!-- 수강 문의 -->
    <div class="flex items-center justify-center gap-4 mt-6 text-[13px] text-g-400">
      <a href="http://pf.kakao.com/_xgnxoUj/chat" target="_blank" class="cursor-pointer hover:text-g-600">수강 문의</a>
    </div>
  </div>

  <p class="text-center text-[10px] text-g-300 pb-6">케빈샘랩 · 안산선부캠퍼스</p>
</div>
{% endblock %}
