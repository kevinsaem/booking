<!-- templates/booking/payment_fail.html -->
<!-- 화면: 결제 실패 -->
{% extends "base.html" %}

{% block title %}결제 실패 - 케빈샘랩{% endblock %}

{% block content %}
<div class="min-h-screen bg-g-100 pb-20 fade">

  <!-- 헤더 -->
  <div class="bg-white px-4 pt-4 pb-3 border-b border-g-200 text-center">
    <h1 class="text-[16px] font-bold text-g-800">결제 실패</h1>
  </div>

  <div class="px-4 pt-10 text-center">
    <!-- 실패 아이콘 -->
    <div class="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-5 pop">
      <svg width="36" height="36" viewBox="0 0 24 24" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>

    <h2 class="text-[20px] font-extrabold text-g-900 mb-1">결제에 실패했습니다</h2>
    <p class="text-[14px] text-g-400 mt-2">{{ error_message }}</p>

    {% if error_code %}
    <p class="text-[11px] text-g-300 mt-1">오류 코드: {{ error_code }}</p>
    {% endif %}

    <!-- 버튼 -->
    <div class="flex gap-2 mt-8">
      <a href="/booking/payment"
         class="flex-1 h-12 bg-nv-600 text-white rounded-xl font-bold text-[13px] flex items-center justify-center active:bg-nv-700">
        다시 시도
      </a>
    </div>
  </div>

</div>
{% endblock %}
