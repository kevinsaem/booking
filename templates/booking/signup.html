<!-- templates/booking/signup.html -->
{% extends "base.html" %}

{% block title %}회원가입 - 케빈샘AI코딩학원{% endblock %}

{% block tabbar %}{% endblock %}

{% block content %}
<div class="min-h-screen bg-g-100 pb-10 fade">

  <!-- 헤더 -->
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <a href="/booking/" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <h1 class="text-[16px] font-bold text-g-800">회원가입</h1>
  </div>

  <div class="px-4 pt-5" x-data="{
    step: 1,
    name: '', email: '', nickname: '', phone: '',
    authCode: '',
    sending: false, verifying: false,
    msg: '', msgType: 'error',
    formatPhone() {
      let n = this.phone.replace(/[^0-9]/g, '');
      if (n.length < 4) { this.phone = n; }
      else if (n.length < 8) { this.phone = n.substr(0,3) + '-' + n.substr(3); }
      else { this.phone = n.substr(0,3) + '-' + n.substr(3,4) + '-' + n.substr(7,4); }
    },
    async sendCode() {
      if (!this.name.trim()) { this.msg = '이름을 입력하세요'; this.msgType = 'error'; return; }
      if (!this.email.trim()) { this.msg = '이메일(아이디)을 입력하세요'; this.msgType = 'error'; return; }
      if (this.phone.replace(/[^0-9]/g,'').length < 10) { this.msg = '연락처를 정확히 입력하세요'; this.msgType = 'error'; return; }
      this.sending = true; this.msg = '';
      const form = new FormData();
      form.append('name', this.name);
      form.append('email', this.email);
      form.append('nickname', this.nickname);
      form.append('phone', this.phone);
      form.append('edc_idx', '{{ edc_idx }}');
      const res = await fetch('/booking/signup/send-code', { method: 'POST', body: form });
      const data = await res.json();
      this.sending = false;
      if (data.ok) { this.step = 2; this.msg = '인증코드가 카카오톡으로 발송되었습니다.'; this.msgType = 'success'; }
      else { this.msg = data.error; this.msgType = 'error'; }
    },
    async verify() {
      if (this.authCode.length < 4) { this.msg = '인증코드 4자리를 입력하세요'; this.msgType = 'error'; return; }
      this.verifying = true; this.msg = '';
      const form = new FormData();
      form.append('email', this.email);
      form.append('code', this.authCode);
      const res = await fetch('/booking/signup/verify', { method: 'POST', body: form });
      if (res.redirected) { window.location.href = res.url; return; }
      const data = await res.json();
      this.verifying = false;
      this.msg = data.error; this.msgType = 'error';
    }
  }">

    <!-- STEP 1: 정보 입력 -->
    <div class="card p-5 fade" x-show="step === 1">
      <h2 class="text-[18px] font-bold text-g-800 mb-1">케빈샘AI코딩학원 회원가입</h2>
      <p class="text-[13px] text-g-400 mb-1">정보 입력 후 연락처로 인증코드를 보내드립니다.</p>
      <p class="text-[13px] text-nv-600 font-medium mb-5">📍 {{ campus_name }}</p>

      <div class="space-y-4">
        <div>
          <label class="block text-[13px] font-medium text-g-600 mb-1">이름 <span class="text-red-500">*</span></label>
          <input type="text" x-model="name" placeholder="홍길동"
                 class="w-full h-[44px] px-4 bg-g-50 border border-g-200 rounded-xl text-[14px] placeholder-g-400 focus:border-nv-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-[13px] font-medium text-g-600 mb-1">이메일 (아이디) <span class="text-red-500">*</span></label>
          <input type="email" x-model="email" placeholder="example@email.com"
                 class="w-full h-[44px] px-4 bg-g-50 border border-g-200 rounded-xl text-[14px] placeholder-g-400 focus:border-nv-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-[13px] font-medium text-g-600 mb-1">닉네임</label>
          <input type="text" x-model="nickname" placeholder="표시될 이름 (선택)"
                 class="w-full h-[44px] px-4 bg-g-50 border border-g-200 rounded-xl text-[14px] placeholder-g-400 focus:border-nv-500 focus:outline-none">
        </div>
        <div>
          <label class="block text-[13px] font-medium text-g-600 mb-1">연락처 <span class="text-red-500">*</span></label>
          <input type="tel" x-model="phone" @input="formatPhone()" maxlength="13" placeholder="010-0000-0000"
                 class="w-full h-[44px] px-4 bg-g-50 border border-g-200 rounded-xl text-[14px] placeholder-g-400 focus:border-nv-500 focus:outline-none">
        </div>

        <template x-if="msg">
          <p class="text-xs text-center" :class="msgType === 'error' ? 'text-red-500' : 'text-green-600'" x-text="msg"></p>
        </template>

        <label class="flex items-start gap-2 pt-2">
          <input type="checkbox" id="agree" class="mt-1 accent-nv-600">
          <span class="text-[12px] text-g-500">개인정보 수집 및 이용에 동의합니다.</span>
        </label>

        <button @click="if(!document.getElementById('agree').checked){msg='개인정보 동의가 필요합니다';msgType='error';return;}sendCode()"
                :disabled="sending"
                class="w-full h-[48px] bg-nv-600 text-white rounded-xl font-bold text-[15px] active:bg-nv-700 transition-all disabled:opacity-50">
          <span x-show="!sending">인증코드 발송</span>
          <span x-show="sending">발송 중...</span>
        </button>
      </div>

      <a href="/booking/" class="block text-center text-[13px] text-g-400 mt-4 hover:text-g-600">이미 회원이신가요? 로그인</a>
    </div>

    <!-- STEP 2: 인증코드 입력 -->
    <div class="card p-5 fade" x-show="step === 2" x-cloak>
      <h2 class="text-[18px] font-bold text-g-800 mb-1">인증코드 입력</h2>
      <p class="text-[13px] text-g-400 mb-5">카카오톡으로 발송된 4자리 인증코드를 입력하세요.</p>

      <div class="space-y-4">
        <div>
          <label class="block text-[13px] font-medium text-g-600 mb-1">인증코드 <span class="text-red-500">*</span></label>
          <input type="text" x-model="authCode" maxlength="4" inputmode="numeric" placeholder="4자리 숫자"
                 @input="if(authCode.length === 4) verify()"
                 class="w-full h-[52px] px-4 bg-g-50 border border-g-200 rounded-xl text-[20px] text-center font-bold tracking-[8px] placeholder-g-400 focus:border-nv-500 focus:outline-none">
        </div>

        <template x-if="msg">
          <p class="text-xs text-center" :class="msgType === 'error' ? 'text-red-500' : 'text-green-600'" x-text="msg"></p>
        </template>

        <p x-show="verifying" class="text-[13px] text-nv-600 text-center font-medium">인증 확인 중...</p>

        <button @click="sendCode()" class="w-full text-center text-[13px] text-nv-600 font-medium mt-2">인증코드 재발송</button>
        <button @click="step=1;msg=''" class="w-full text-center text-[13px] text-g-400 mt-1">이전으로 돌아가기</button>
      </div>
    </div>

  </div>
</div>
{% endblock %}
