<!-- templates/booking/repeat.html -->
<!-- 화면: 반복 예약 (매주 같은 요일/시간, 최대 12주) -->
<!-- 프로토타입 v3 섹션 4 (p==='repeat') 완전 동일 -->
{% extends "base.html" %}

{% block title %}반복 예약 - 케빈샘AI코딩학원{% endblock %}

{% block content %}
<script>
var __repeatWeeks = {{ repeat_weeks | tojson }};
var __repeatRemaining = {{ remaining }};
</script>
<div class="min-h-screen bg-g-100 pb-40 fade" x-data="repeatBooking(__repeatRemaining, __repeatWeeks)">

  <!-- 헤더 -->
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <a href="/booking/calendar" class="back-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <h1 class="text-[16px] font-bold text-g-800 flex-1">반복 예약</h1>
    <span class="text-[12px] text-nv-600 font-bold">5/7</span>
  </div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500" style="width:71%"></div></div>

  <div class="px-4 pt-4 space-y-4">
    <div>
      <h2 class="text-[18px] font-bold text-g-900">매주 같은 시간에<br>추가 예약하시겠어요?</h2>
      <p class="text-[13px] text-g-400 mt-1">최대 12주, 잔여 횟수 이내</p>
    </div>

    <!-- 잔여횟수 -->
    <div class="bg-nv-50 rounded-xl p-3 flex items-center gap-3">
      <span class="text-[11px] font-bold text-nv-600">남은 수업</span>
      <span class="text-[14px] font-extrabold text-nv-700" x-text="remaining+'회'"></span>
      <span class="text-[12px] text-g-400 ml-auto" x-text="'선택: '+selected.length+'회'"></span>
    </div>

    <!-- 주차 목록 -->
    <form method="POST" action="/booking/confirm" id="repeat-form">
      <input type="hidden" name="date" value="{{ base_date }}">
      <input type="hidden" name="time" value="{{ time }}">
      <input type="hidden" name="room_idx" value="{{ room_idx }}">
      <input type="hidden" name="teacher_id" value="{{ teacher_id }}">
      <input type="hidden" name="teacher_name" value="{{ teacher_name }}">
      <input type="hidden" name="settle_code" value="{{ settle_code }}">

      <div class="space-y-1.5">
        <template x-for="(week, idx) in weeks" :key="idx">
          <button type="button" @click="toggleWeek(idx)"
                  class="w-full flex items-center gap-3 bg-white rounded-xl px-4 py-3 shadow-sm transition active:scale-[.98]"
                  :class="{'ring-2 ring-nv-400 bg-nv-50': idx === 0, 'ring-2 ring-nv-300 bg-nv-50': selected.includes(idx) && idx !== 0, 'opacity-30 cursor-default': week.disabled}">
            <input type="checkbox" :name="'dates[]'" :value="week.date" :checked="selected.includes(idx)" :disabled="week.disabled" class="hidden">
            <div class="w-5 h-5 rounded-md border-2 flex items-center justify-center text-[10px]"
                 :class="{'bg-nv-500 border-nv-500 text-white': idx === 0 || selected.includes(idx), 'border-g-300': !selected.includes(idx) && idx !== 0}">
              <span x-show="idx === 0 || selected.includes(idx)">&#10003;</span>
            </div>
            <span class="flex-1 text-left text-[13px] font-medium text-g-700" x-text="week.label"></span>
            <span class="text-[10px] font-bold"
                  :class="{'text-nv-600': idx === 0, 'text-nv-500': selected.includes(idx) && idx !== 0, 'text-red-400': week.disabled, 'text-g-300': !selected.includes(idx) && !week.disabled && idx !== 0}"
                  x-text="idx === 0 ? '기본' : (week.disabled ? '마감' : (selected.includes(idx) ? '선택됨' : '선택'))">
            </span>
          </button>
        </template>
      </div>

      <p class="text-center text-[13px] text-g-400 mt-4">
        총 <strong class="text-nv-600" x-text="selected.length+'회'"></strong> 예약
        · 잔여 <strong class="text-nv-600" x-text="(remaining - selected.length)+'회'"></strong>
      </p>
    </form>
  </div>

  <!-- 하단 버튼 -->
  <div class="fixed bottom-[66px] left-1/2 -translate-x-1/2 w-full max-w-[430px] px-4 pb-3 pt-3 bg-gradient-to-t from-g-100 via-g-100 z-20">
    <div class="flex gap-2">
      <button @click="skipRepeat()" class="flex-1 h-[50px] bg-g-200 rounded-xl font-bold text-[14px] text-g-500 active:bg-g-300">1회만 예약</button>
      <button @click="submitForm()" class="flex-1 h-[50px] bg-nv-600 text-white rounded-xl font-bold text-[14px] active:bg-nv-700">선택 완료</button>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function repeatBooking(remaining, weeks) {
    return {
        remaining: remaining,
        weeks: weeks,
        selected: [0],

        toggleWeek(idx) {
            if (idx === 0) return;
            if (this.weeks[idx].disabled) return;

            const pos = this.selected.indexOf(idx);
            if (pos > -1) {
                this.selected.splice(pos, 1);
            } else {
                if (this.selected.length >= this.remaining) {
                    showToast('남은 수업 횟수를 초과할 수 없습니다');
                    return;
                }
                this.selected.push(idx);
            }
        },

        submitForm() {
            // 선택된 날짜를 hidden input으로 추가
            const form = document.getElementById('repeat-form');
            form.querySelectorAll('input[name="dates[]"]').forEach(el => el.remove());
            this.selected.forEach(idx => {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'dates[]';
                input.value = this.weeks[idx].date;
                form.appendChild(input);
            });
            form.submit();
        },

        skipRepeat() {
            this.selected = [0];
            this.$nextTick(() => {
                this.submitForm();
            });
        }
    };
}
</script>
{% endblock %}
