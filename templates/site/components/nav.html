<!-- NAV -->
<nav id="nav">
  <a href="/" class="logo" style="display: flex; align-items: center; gap: 8px;">
    <img src="/static/site/images/logo_transparent.png" alt="케빈샘AI코딩 로고" style="height: 22px; width: auto;">
    <span style="font-size: var(--fs-subtitle); font-weight: 800; letter-spacing: -0.5px;">케빈샘<span style="color: var(--brand);">AI</span>코딩</span>
  </a>
  <div class="nlinks" id="nav-links">
    <a href="/youth">청소년 코딩</a>
    <a href="/adult">성인1:1AI활용</a>
    <a href="/corporate">기업 AI교육</a>
    <a href="/autobiography">AI자서전출판</a>
    <a href="/campus">캠퍼스</a>
    <a href="/#cta" class="cta-nav">상담 예약</a>
  </div>
  <button class="mob-btn" aria-label="메뉴 열기/닫기" onclick="toggleMobileMenu()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
</nav>
<script>
function toggleMobileMenu() {
  var links = document.getElementById('nav-links');
  var isOpen = links.classList.contains('mob-open');
  if (isOpen) {
    links.classList.remove('mob-open');
    links.removeAttribute('style');
  } else {
    links.classList.add('mob-open');
    links.style.cssText = 'display:flex;flex-direction:column;position:absolute;top:52px;right:20px;background:white;padding:16px 24px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.1);gap:12px;z-index:101;border:1px solid #E2E8F0;';
    var allLinks = links.querySelectorAll('a');
    allLinks.forEach(function(a) { a.style.color = '#334155'; });
  }
}
document.addEventListener('click', function(e) {
  var links = document.getElementById('nav-links');
  var btn = document.querySelector('.mob-btn');
  if (links.classList.contains('mob-open') && !links.contains(e.target) && !btn.contains(e.target)) {
    links.classList.remove('mob-open');
    links.removeAttribute('style');
  }
});
// 메뉴 내 링크 클릭 시 자동 닫기
var navLinks = document.querySelectorAll('#nav-links a');
navLinks.forEach(function(link) {
  link.addEventListener('click', function() {
    var links = document.getElementById('nav-links');
    if (links.classList.contains('mob-open')) {
      links.classList.remove('mob-open');
      links.removeAttribute('style');
    }
  });
});
</script>
