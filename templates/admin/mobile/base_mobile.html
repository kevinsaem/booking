<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#43A047">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>{% block title %}관리자{% endblock %} - 케빈샘 관리</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']},colors:{
nv:{50:'#E8F5E9',100:'#C8E6C9',200:'#A5D6A7',300:'#81C784',400:'#66BB6A',500:'#4CAF50',600:'#43A047',700:'#388E3C',800:'#2E7D32'},
g:{50:'#FAFAFA',100:'#F5F5F5',200:'#EEEEEE',300:'#E0E0E0',400:'#BDBDBD',500:'#9E9E9E',600:'#757575',700:'#616161',800:'#424242',900:'#212121'}
}}}}
</script>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Noto Sans KR', sans-serif; }
  .tab-item { transition: color 0.15s; }
  .tab-item.active { color: #43A047; }
  .tab-item:not(.active) { color: #9E9E9E; }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
{% block head %}{% endblock %}
</head>
<body class="font-sans bg-gray-100">

<!-- 모바일 컨테이너 -->
<div id="app" class="max-w-[430px] mx-auto min-h-screen bg-gray-100 relative pb-20">

  <!-- 상단 바 -->
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[11px] font-semibold bg-nv-50 text-nv-700">관리자</span>
      <span class="text-sm font-medium text-g-800">{{ admin_user.name if admin_user else '' }}</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="/admin/" class="text-[12px] text-g-500 hover:text-g-700">PC버전</a>
      <form action="/booking/logout" method="post" class="inline">
        <button type="submit" class="text-[12px] text-g-500 hover:text-g-700">로그아웃</button>
      </form>
    </div>
  </header>

  <!-- 플래시 메시지 -->
  {% if flash_message %}
  <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 3000)"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="mx-4 mt-3 p-3 rounded-xl text-sm font-medium fade-in
              {% if flash_type == 'error' %}bg-red-50 text-red-700{% else %}bg-nv-50 text-nv-700{% endif %}">
    {{ flash_message }}
  </div>
  {% endif %}

  <!-- 페이지 콘텐츠 -->
  <main class="px-4 pt-4 fade-in">
    {% block content %}{% endblock %}
  </main>

  <!-- 하단 탭바 -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-gray-200 z-50">
    <div class="flex py-1.5 px-2">

      <!-- 홈 -->
      <a href="/admin/m/" class="tab-item {% if active_tab == 'home' %}active{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="text-[10px] font-medium">홈</span>
      </a>

      <!-- 예약 -->
      <a href="/admin/m/bookings" class="tab-item {% if active_tab == 'bookings' %}active{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
          <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        </svg>
        <span class="text-[10px] font-medium">예약</span>
      </a>

      <!-- 수강생 -->
      <a href="/admin/m/students" class="tab-item {% if active_tab == 'students' %}active{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="22" height="22" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span class="text-[10px] font-medium">수강생</span>
      </a>

    </div>
  </nav>

  <!-- 토스트 -->
  <div id="toast"
       x-data="{ show: false, msg: '' }"
       @toast.window="msg = $event.detail.message; show = true; setTimeout(() => show = false, 2200)"
       x-show="show"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0 translate-y-4"
       class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-g-800 text-white px-5 py-2.5 rounded-xl text-[13px] font-medium shadow-lg z-[999] whitespace-nowrap"
       x-text="msg">
  </div>

</div>

{% block scripts %}{% endblock %}
</body>
</html>
