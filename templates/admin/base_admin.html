<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}관리자{% endblock %} - 케빈샘 관리</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Pretendard','sans-serif']},colors:{
accent:{500:'#43A047',600:'#388E3C',700:'#2E7D32'}
}}}}
</script>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  body { font-family: 'Pretendard Variable', 'Pretendard', sans-serif; }
  .sidebar-link { @apply flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition-colors; }
  .sidebar-link.active { @apply bg-green-50 text-green-700 font-semibold; }
</style>
{% block head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen">

<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/40 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-white border-r border-slate-200 z-40 transform -translate-x-full lg:translate-x-0 transition-transform duration-200">
  <div class="p-5 border-b border-slate-200">
    <a href="/admin/" class="text-lg font-bold text-slate-800">케빈샘 <span class="text-accent-500">관리</span></a>
  </div>
  <nav class="p-3 space-y-1">
    <a href="/admin/" class="sidebar-link {% if active_menu == 'dashboard' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
      대시보드
    </a>
    <a href="/admin/students" class="sidebar-link {% if active_menu == 'students' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
      수강생 관리
    </a>
    <a href="/admin/teachers" class="sidebar-link {% if active_menu == 'teachers' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v12a2 2 0 01-2 2zM9 9h6m-6 4h4"/></svg>
      멘토 관리
    </a>
    <a href="/admin/schedule" class="sidebar-link {% if active_menu == 'schedule' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      시간표 관리
    </a>
    <a href="/admin/bookings" class="sidebar-link {% if active_menu == 'bookings' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      예약 관리
    </a>
    <a href="/admin/notices" class="sidebar-link {% if active_menu == 'notices' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"/></svg>
      공지사항
    </a>
    <a href="/admin/packages" class="sidebar-link {% if active_menu == 'packages' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      패키지 관리
    </a>
    <a href="/admin/users" class="sidebar-link {% if active_menu == 'users' %}active{% endif %}">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      사용자 관리
    </a>
  </nav>
</aside>

<!-- Main content -->
<div class="lg:ml-60 min-h-screen">
  <!-- Top bar -->
  <header class="sticky top-0 z-20 bg-white border-b border-slate-200 px-4 lg:px-6 py-3 flex items-center justify-between">
    <button onclick="toggleSidebar()" class="lg:hidden p-2 -ml-2 text-slate-600 hover:text-slate-900">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <h1 class="text-lg font-semibold text-slate-800 hidden lg:block">{% block page_title %}대시보드{% endblock %}</h1>
    <div class="flex items-center gap-3">
      <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">관리자</span>
      <form action="/booking/logout" method="post">
        <button type="submit" class="text-sm text-slate-500 hover:text-slate-700">로그아웃</button>
      </form>
    </div>
  </header>

  <!-- Page content -->
  <main class="p-4 lg:p-6">
    {% if flash_message %}
    <div class="mb-4 p-3 rounded-lg text-sm {% if flash_type == 'error' %}bg-red-50 text-red-700{% else %}bg-green-50 text-green-700{% endif %}">
      {{ flash_message }}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</div>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.toggle('-translate-x-full');
  overlay.classList.toggle('hidden');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
