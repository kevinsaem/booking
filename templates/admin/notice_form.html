{% extends "admin/base_admin.html" %}
{% block title %}{{ '공지 수정' if notice else '새 공지 작성' }}{% endblock %}
{% block page_title %}{{ '공지 수정' if notice else '새 공지 작성' }}{% endblock %}

{% block content %}
<a href="/admin/notices" class="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-700 mb-4">
  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
  목록으로
</a>

<div class="bg-white rounded-xl border border-slate-200 p-5">
  <form method="post" action="{{ '/admin/notices/update/' ~ notice.notice_id if notice else '/admin/notices/create' }}">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">제목</label>
        <input type="text" name="title" required value="{{ notice.title if notice else '' }}"
               class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">내용</label>
        <textarea name="content" rows="6"
                  class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none">{{ notice.content if notice else '' }}</textarea>
      </div>
    </div>
    <div class="mt-6 flex gap-2">
      <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700 transition-colors">
        {{ '수정' if notice else '작성' }}
      </button>
      <a href="/admin/notices" class="px-6 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-200 transition-colors">취소</a>
    </div>
  </form>
</div>
{% endblock %}
