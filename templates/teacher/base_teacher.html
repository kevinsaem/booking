<!-- templates/teacher/base_teacher.html -->
<!-- 멘토 포털 공통 레이아웃: 모바일 최적화 (max-width 430px) -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#43A047">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<title>케빈샘AI코딩학원</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']},colors:{
nv:{50:'#E8F5E9',100:'#C8E6C9',200:'#A5D6A7',300:'#81C784',400:'#66BB6A',500:'#4CAF50',600:'#43A047',700:'#388E3C',800:'#2E7D32'},
g:{50:'#FAFAFA',100:'#F5F5F5',200:'#EEEEEE',300:'#E0E0E0',400:'#BDBDBD',500:'#9E9E9E',600:'#757575',700:'#616161',800:'#424242',900:'#212121'}
}}}}
</script>

<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="/static/css/style.css" rel="stylesheet">

{% block head %}{% endblock %}
</head>
<body class="font-sans bg-gray-100">

<div id="app" class="max-w-[430px] mx-auto min-h-screen bg-gray-100 relative" {% block app_attrs %}{% endblock %}>

  {% block content %}{% endblock %}

  <!-- 강사 하단 탭바 -->
  {% block tabbar %}
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] bg-white border-t border-gray-200 z-50 safe-bottom">
    <div class="flex py-1.5 px-2">

      <!-- 홈 -->
      <a href="/teacher/" class="tab {% if active_tab == 'home' %}on{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="text-[10px]">홈</span>
      </a>

      <!-- 스케줄 -->
      <a href="/teacher/schedule" class="tab {% if active_tab == 'schedule' %}on{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
        <span class="text-[10px]">스케줄</span>
      </a>

      <!-- 수강생 -->
      <a href="/teacher/students" class="tab {% if active_tab == 'students' %}on{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span class="text-[10px]">수강생</span>
      </a>

      <!-- 메시지 -->
      <a href="/teacher/messages" class="tab {% if active_tab == 'messages' %}on{% endif %} flex-1 flex flex-col items-center gap-0.5 py-1.5 relative">
        <svg width="20" height="20" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>
        {% if unread_count is defined and unread_count and unread_count > 0 %}
        <div class="absolute top-0.5 right-1/4 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white font-bold flex items-center justify-center">{{ unread_count }}</div>
        {% endif %}
        <span class="text-[10px]">메시지</span>
      </a>

    </div>
  </nav>
  {% endblock %}

  <!-- 토스트 메시지 -->
  <div id="toast"
       x-data="{ show: false, msg: '' }"
       @toast.window="msg = $event.detail.message; show = true; setTimeout(() => show = false, 2200)"
       x-show="show"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0 translate-y-4"
       class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-g-800 text-white px-5 py-2.5 rounded-xl text-[13px] font-medium shadow-lg z-[999] whitespace-nowrap"
       x-text="msg">
  </div>
  <div id="memo-toast"></div>
</div>

<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
