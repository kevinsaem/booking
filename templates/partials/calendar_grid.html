<!-- templates/partials/calendar_grid.html -->
<!-- HTMX partial: 캘린더 날짜 그리드 -->
<!-- hx-get="/booking/partials/calendar-grid?year=2026&month=4" 로 호출 -->
<div class="grid grid-cols-7 gap-1">
  {% for cell in calendar_cells %}
  {% if cell.empty %}
  <div class="aspect-square"></div>
  {% elif cell.available %}
  <button onclick="selectDate('{{ cell.date_str }}', this)"
          class="cal-day aspect-square flex items-center justify-center rounded-full text-[13px] bg-nv-50 text-nv-700 font-medium active:scale-95 transition">
    {{ cell.day }}
  </button>
  {% else %}
  <div class="aspect-square flex items-center justify-center rounded-full text-[13px] text-g-300">
    {{ cell.day }}
  </div>
  {% endif %}
  {% endfor %}
</div>
