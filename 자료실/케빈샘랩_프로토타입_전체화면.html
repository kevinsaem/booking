<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#43A047">
<title>케빈샘AI코딩학원 프로토타입 전체화면</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']},colors:{
nv:{50:'#E8F5E9',100:'#C8E6C9',200:'#A5D6A7',300:'#81C784',400:'#66BB6A',500:'#4CAF50',600:'#43A047',700:'#388E3C',800:'#2E7D32'},
g:{50:'#FAFAFA',100:'#F5F5F5',200:'#EEEEEE',300:'#E0E0E0',400:'#BDBDBD',500:'#9E9E9E',600:'#757575',700:'#616161',800:'#424242',900:'#212121'}
}}}}
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
[x-cloak]{display:none!important}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html{overscroll-behavior:contain}
input:focus,textarea:focus{outline:none}
::-webkit-scrollbar{display:none}
:root{--color-primary:#43A047;--color-primary-light:#E8F5E9;--color-primary-dark:#2E7D32;--color-accent:#FBC02D;--color-accent-light:#FFF9C4;--color-danger:#E53935;--color-danger-light:#FFEBEE;--color-text:#212121;--color-text-sub:#757575;--color-text-hint:#BDBDBD;--color-bg:#F5F5F5;--color-card:#FFFFFF;--color-border:#EEEEEE}
.fade{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.pop{animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.s1{animation-delay:.05s}.s2{animation-delay:.1s}.s3{animation-delay:.15s}.s4{animation-delay:.2s}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
.tab{color:#BDBDBD}.tab.on{color:#43A047;font-weight:700}
.ic{display:inline-flex;align-items:center;justify-content:center}
.ic svg{stroke-linecap:round;stroke-linejoin:round;fill:none}
.back-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#9E9E9E}
.divider{height:1px;background:#EEEEEE}
.divider-thick{height:8px;background:#F5F5F5}
</style>
</head>
<body class="font-sans bg-gray-300">

<div id="app" class="max-w-[430px] mx-auto min-h-screen bg-gray-100 relative"
     x-data="app()" x-cloak>

<!-- ==================== 1. 로그인 ==================== -->
<template x-if="page==='login'">
<div class="min-h-screen bg-white flex flex-col px-6 fade">
  <div class="flex-1 flex flex-col justify-center">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-nv-600 rounded-2xl mb-4 shadow-lg shadow-nv-600/20">
        <span class="text-white font-extrabold text-2xl">K</span>
      </div>
      <h1 class="text-[22px] font-extrabold text-g-900">케빈샘AI코딩학원</h1>
      <p class="text-[13px] text-g-500 mt-1">성인 1:1 AI활용 과정</p>
    </div>
    <p class="text-center text-[14px] text-g-600 mb-6">카카오 계정으로 간편하게 시작하세요</p>
    <button @click="go('home')" class="w-full h-[50px] rounded-xl font-bold text-[15px] flex items-center justify-center gap-2 active:scale-[.98] transition-all" style="background-color:#FEE500;color:#191919;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#191919"><path d="M12 3C6.48 3 2 6.36 2 10.44c0 2.63 1.74 4.94 4.36 6.26l-1.1 4.08c-.1.36.32.65.64.44l4.84-3.2c.42.04.84.06 1.26.06 5.52 0 10-3.36 10-7.64C22 6.36 17.52 3 12 3z"/></svg>
      카카오로 시작하기
    </button>
    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-g-200"></div>
      <span class="text-[12px] text-g-400">또는</span>
      <div class="flex-1 h-px bg-g-200"></div>
    </div>
    <div class="space-y-3">
      <input type="text" placeholder="이름" value="강도열" class="w-full h-[44px] px-4 bg-g-100 rounded-xl text-[14px] placeholder-g-400">
      <input type="text" placeholder="인증번호 4자리" value="1234" maxlength="4" inputmode="numeric" class="w-full h-[44px] px-4 bg-g-100 rounded-xl text-[14px] placeholder-g-400">
      <button @click="go('home')" class="w-full h-[44px] bg-g-800 text-white rounded-xl font-bold text-[14px] active:bg-g-900">로그인</button>
    </div>
    <div class="flex items-center justify-center gap-4 mt-6 text-[13px] text-g-400">
      <span class="cursor-pointer" @click="toast('카카오톡 상담으로 연결됩니다')">수강 문의</span>
    </div>
  </div>
  <p class="text-center text-[10px] text-g-300 pb-6">케빈샘AI코딩학원 · 안산선부캠퍼스</p>
</div>
</template>

<!-- ==================== 2. 홈 ==================== -->
<template x-if="page==='home'">
<div class="min-h-screen bg-g-100 pb-20 fade">
  <div class="bg-nv-600 text-white px-5 pt-5 pb-8 rounded-b-[28px]">
    <div class="flex items-center justify-between mb-5">
      <div>
        <p class="text-nv-200 text-[12px]">안녕하세요</p>
        <h2 class="text-[20px] font-bold mt-0.5">강도열님</h2>
      </div>
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-sm">강</div>
    </div>
    <div class="bg-white/15 rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3">
        <span class="text-nv-100 text-[12px]">취미반 주1회 12주</span>
        <span class="text-white/70 text-[12px]">안산선부캠퍼스</span>
      </div>
      <div class="flex items-end gap-3">
        <div class="text-center">
          <span class="text-white/50 text-[11px] block mb-1">제공</span>
          <span class="text-[28px] font-extrabold leading-none text-white/70">12</span>
          <span class="text-[12px] text-nv-100">회</span>
        </div>
        <div class="w-px h-10 bg-white/20"></div>
        <div class="text-center">
          <span class="text-white/50 text-[11px] block mb-1">남은</span>
          <span class="text-[42px] font-extrabold leading-none">8</span>
          <span class="text-[14px] text-nv-100 pb-1.5">회</span>
        </div>
        <div class="flex-1"></div>
        <button @click="go('reserve')" class="h-10 px-5 bg-white text-nv-700 rounded-xl font-bold text-[13px] flex items-center active:scale-[.97]">예약하기</button>
      </div>
    </div>
  </div>
  <div class="px-4 -mt-3 space-y-4">
    <div class="card p-4 grid grid-cols-4 gap-1 fade s1">
      <button @click="go('reserve')" class="flex flex-col items-center gap-1.5 py-2">
        <div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div>
        <span class="text-[11px] text-g-600">수업예약</span>
      </button>
      <button @click="go('dashboard')" class="flex flex-col items-center gap-1.5 py-2">
        <div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></div>
        <span class="text-[11px] text-g-600">학습현황</span>
      </button>
      <button @click="go('messages')" class="flex flex-col items-center gap-1.5 py-2 relative">
        <div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
        <div class="absolute top-1 right-3 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white font-bold flex items-center justify-center">2</div>
        <span class="text-[11px] text-g-600">메시지</span>
      </button>
      <button @click="go('payment')" class="flex flex-col items-center gap-1.5 py-2">
        <div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="3"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
        <span class="text-[11px] text-g-600">수강/결제</span>
      </button>
    </div>
    <div class="fade s2">
      <div class="flex justify-between items-center mb-2 px-1">
        <h3 class="text-[14px] font-bold text-g-800">다가오는 수업</h3>
        <span @click="go('mybookings')" class="text-[12px] text-nv-600 cursor-pointer font-medium">전체 &rsaquo;</span>
      </div>
      <div class="card p-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 bg-nv-50 rounded-xl flex flex-col items-center justify-center">
            <span class="text-[10px] text-nv-500">3월</span>
            <span class="text-[16px] font-extrabold text-nv-700 -mt-0.5">26</span>
          </div>
          <div class="flex-1">
            <p class="text-[14px] font-bold text-g-800">Kevin(C) 멘토</p>
            <p class="text-[12px] text-g-400">14:00~14:50 · 수요일</p>
          </div>
          <span class="text-[11px] font-bold text-nv-600 bg-nv-50 px-3 py-1 rounded-full">D-2</span>
        </div>
      </div>
    </div>
    <button @click="go('notices')" class="block w-full fade s3 cursor-pointer text-left">
      <div class="bg-amber-50 rounded-2xl p-4 flex items-center gap-3">
        <div class="w-9 h-9 bg-amber-100 rounded-lg ic flex-shrink-0">
          <svg width="18" height="18" viewBox="0 0 24 24" stroke="#92400E" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-[13px] font-bold text-g-800">4월 수강 일정 안내</p>
          <p class="text-[11px] text-g-500 mt-0.5">4월 수업 일정과 휴강일을 확인하세요</p>
        </div>
        <span class="text-g-300">&rsaquo;</span>
      </div>
    </button>
    <div class="fade s4">
      <div class="flex justify-between items-center mb-2 px-1">
        <h3 class="text-[14px] font-bold text-g-800">내 예약</h3>
        <span @click="go('mybookings')" class="text-[12px] text-nv-600 cursor-pointer font-medium">전체 &rsaquo;</span>
      </div>
      <div class="card p-4 space-y-3">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-nv-50 rounded-lg flex flex-col items-center justify-center">
            <span class="text-[9px] text-nv-500">3월</span>
            <span class="text-[14px] font-extrabold text-nv-700 -mt-0.5">26</span>
          </div>
          <div class="flex-1">
            <p class="text-[13px] font-bold text-g-800">Kevin(C) 멘토</p>
            <p class="text-[11px] text-g-400">14:00~14:50 · 수요일</p>
          </div>
          <span class="text-[10px] font-bold bg-nv-50 text-nv-600 px-2.5 py-1 rounded-full">예약확정</span>
        </div>
        <div class="h-px bg-g-100"></div>
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-nv-50 rounded-lg flex flex-col items-center justify-center">
            <span class="text-[9px] text-nv-500">4월</span>
            <span class="text-[14px] font-extrabold text-nv-700 -mt-0.5">2</span>
          </div>
          <div class="flex-1">
            <p class="text-[13px] font-bold text-g-800">Kevin(C) 멘토</p>
            <p class="text-[11px] text-g-400">14:00~14:50 · 수요일</p>
          </div>
          <span class="text-[10px] font-bold bg-nv-50 text-nv-600 px-2.5 py-1 rounded-full">예약확정</span>
        </div>
      </div>
    </div>
  </div>
</div>
</template>

<!-- ==================== 3. 수업예약 (캘린더) ==================== -->
<template x-if="page==='reserve'">
<div class="min-h-screen bg-g-100 pb-40 fade" x-data="reserveData()">
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <button @click="go('home')" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="text-[16px] font-bold text-g-800 flex-1" x-text="stepTitle">날짜 선택</h1>
    <span class="text-[12px] text-nv-600 font-bold" x-text="stepNum">2/7</span>
  </div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500 transition-all duration-500" :style="'width:'+progress+'%'"></div></div>
  <div class="px-4 pt-4 space-y-3">
    <div class="flex items-center gap-2 px-1">
      <span class="text-[11px] font-bold text-nv-600 bg-nv-50 px-2.5 py-1 rounded-full">남은 수업 8회</span>
    </div>

    <!-- 캘린더 -->
    <div class="card overflow-hidden" x-show="step>=1">
      <div class="flex items-center justify-between px-4 py-3 border-b border-g-100">
        <button class="w-8 h-8 bg-g-100 rounded-lg ic text-g-500 active:bg-g-200"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span class="font-bold text-g-800">2026년 3월</span>
        <button class="w-8 h-8 bg-g-100 rounded-lg ic text-g-500 active:bg-g-200"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="p-3">
        <div class="grid grid-cols-7 text-center mb-1">
          <template x-for="d in ['일','월','화','수','목','금','토']"><span class="text-[11px] font-medium py-1" :class="d==='일'?'text-red-400':d==='토'?'text-blue-400':'text-g-400'" x-text="d"></span></template>
        </div>
        <div class="grid grid-cols-7 text-center gap-y-1">
          <template x-for="i in 6"><div></div></template>
          <template x-for="day in 31">
            <button @click="if(calAvail(day)){selDate=day;step=2}" class="w-10 h-10 mx-auto rounded-xl text-[13px] font-medium flex items-center justify-center transition"
              :class="selDate===day?'bg-nv-500 text-white font-bold':calAvail(day)?'text-g-700 active:bg-nv-50':'text-g-300 cursor-default'"
              x-text="day"></button>
          </template>
        </div>
      </div>
    </div>

    <!-- 시간 선택 -->
    <div x-show="step>=2" class="fade">
      <h3 class="text-[14px] font-bold text-g-800 mb-2 px-1">시간 선택</h3>
      <div class="grid grid-cols-3 gap-2">
        <template x-for="t in times">
          <button @click="selTime=t;step=3" class="card py-3 text-center text-[13px] font-medium transition active:scale-[.97]" :class="selTime===t?'ring-2 ring-nv-500 bg-nv-50 text-nv-700 font-bold':'text-g-600'" x-text="t"></button>
        </template>
      </div>
    </div>

    <!-- 멘토 선택 -->
    <div x-show="step>=3" class="fade">
      <h3 class="text-[14px] font-bold text-g-800 mb-2 px-1">멘토 선택</h3>
      <div class="space-y-2">
        <template x-for="m in mentors">
          <button @click="selMentor=m.name;step=4" class="card p-4 w-full flex items-center gap-3 transition active:scale-[.98]" :class="selMentor===m.name?'ring-2 ring-nv-500 bg-nv-50':''">
            <div class="w-12 h-12 bg-nv-50 rounded-full flex items-center justify-center font-extrabold text-nv-600 text-lg" x-text="m.name[0]"></div>
            <div class="flex-1 text-left">
              <p class="text-[14px] font-bold text-g-800" x-text="m.name+' 멘토'"></p>
              <p class="text-[12px] text-g-400" x-text="m.field"></p>
            </div>
          </button>
        </template>
      </div>
    </div>
  </div>

  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] px-4 pb-5 pt-3 bg-gradient-to-t from-g-100 via-g-100 z-20">
    <button @click="if(step===4) go('repeat')" class="w-full h-[50px] rounded-xl font-bold text-[15px] transition active:scale-[.98]" :class="step>=4?'bg-nv-600 text-white':'bg-g-200 text-g-400'" :disabled="step<4" x-text="step<4?'멘토를 선택하세요':'다음 단계'"></button>
  </div>
</div>
</template>

<!-- ==================== 4. 반복예약 ==================== -->
<template x-if="page==='repeat'">
<div class="min-h-screen bg-g-100 pb-40 fade" x-data="repeatData()">
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <button @click="go('reserve')" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="text-[16px] font-bold text-g-800 flex-1">반복 예약</h1>
    <span class="text-[12px] text-nv-600 font-bold">5/7</span>
  </div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500" style="width:71%"></div></div>
  <div class="px-4 pt-4 space-y-4">
    <div>
      <h2 class="text-[18px] font-bold text-g-900">매주 같은 시간에<br>추가 예약하시겠어요?</h2>
      <p class="text-[13px] text-g-400 mt-1">최대 12주, 잔여 횟수 이내</p>
    </div>
    <div class="bg-nv-50 rounded-xl p-3 flex items-center gap-3">
      <span class="text-[11px] font-bold text-nv-600">남은 수업</span>
      <span class="text-[14px] font-extrabold text-nv-700">8회</span>
      <span class="text-[12px] text-g-400 ml-auto">선택: <span x-text="selected.length"></span>회</span>
    </div>
    <div class="space-y-1.5">
      <template x-for="(w,idx) in weeks" :key="idx">
        <button @click="toggle(idx)" class="w-full flex items-center gap-3 bg-white rounded-xl px-4 py-3 shadow-sm transition active:scale-[.98]" :class="{'ring-2 ring-nv-400 bg-nv-50':idx===0,'ring-2 ring-nv-300 bg-nv-50':selected.includes(idx)&&idx!==0,'opacity-30 cursor-default':w.disabled}">
          <div class="w-5 h-5 rounded-md border-2 flex items-center justify-center text-[10px]" :class="idx===0||selected.includes(idx)?'bg-nv-500 border-nv-500 text-white':'border-g-300'">
            <span x-show="idx===0||selected.includes(idx)">&#10003;</span>
          </div>
          <span class="flex-1 text-left text-[13px] font-medium text-g-700" x-text="w.label"></span>
          <span class="text-[10px] font-bold" :class="idx===0?'text-nv-600':w.disabled?'text-red-400':selected.includes(idx)?'text-nv-500':'text-g-300'" x-text="idx===0?'기본':w.disabled?'마감':selected.includes(idx)?'선택됨':'선택'"></span>
        </button>
      </template>
    </div>
    <p class="text-center text-[13px] text-g-400">총 <strong class="text-nv-600" x-text="selected.length+'회'"></strong> 예약 · 잔여 <strong class="text-nv-600" x-text="(8-selected.length)+'회'"></strong></p>
  </div>
  <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] px-4 pb-5 pt-3 bg-gradient-to-t from-g-100 via-g-100 z-20">
    <div class="flex gap-2">
      <button @click="go('confirm')" class="flex-1 h-[50px] bg-g-200 rounded-xl font-bold text-[14px] text-g-500 active:bg-g-300">1회만 예약</button>
