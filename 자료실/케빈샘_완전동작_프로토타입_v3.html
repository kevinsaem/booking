<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#43A047">
<title>케빈샘 AI코딩 - 전체 화면 프로토타입</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Noto Sans KR','sans-serif']},colors:{
nv:{50:'#E8F5E9',100:'#C8E6C9',200:'#A5D6A7',300:'#81C784',400:'#66BB6A',500:'#4CAF50',600:'#43A047',700:'#388E3C',800:'#2E7D32'},
g:{50:'#FAFAFA',100:'#F5F5F5',200:'#EEEEEE',300:'#E0E0E0',400:'#BDBDBD',500:'#9E9E9E',600:'#757575',700:'#616161',800:'#424242',900:'#212121'}
}}}}
</script>
<style>
[x-cloak]{display:none!important}*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}html{overscroll-behavior:contain}input:focus,textarea:focus{outline:none}::-webkit-scrollbar{display:none}
.fade{animation:fadeUp .3s ease both}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}.pop{animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.s1{animation-delay:.05s}.s2{animation-delay:.1s}.s3{animation-delay:.15s}.s4{animation-delay:.2s}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03)}
.tab{color:#BDBDBD}.tab.on{color:#43A047;font-weight:700}
.ic{display:inline-flex;align-items:center;justify-content:center}
.ic svg{stroke-linecap:round;stroke-linejoin:round;fill:none}
.back-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#9E9E9E}
</style>
</head>
<body class="font-sans bg-gray-100">
<div class="max-w-[430px] mx-auto min-h-screen bg-gray-100 relative" x-data="app()" x-cloak>

<!-- ===== 1. 로그인 ===== -->
<template x-if="p==='login'">
<div class="min-h-screen bg-white flex flex-col px-6 fade">
  <div class="flex-1 flex flex-col justify-center">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-nv-600 rounded-2xl mb-4 shadow-lg shadow-nv-600/20"><span class="text-white font-extrabold text-2xl">K</span></div>
      <h1 class="text-[22px] font-extrabold text-g-900">케빈샘 AI코딩</h1>
      <p class="text-[13px] text-g-500 mt-1">성인 1:1 AI활용 과정</p>
    </div>
    <div class="space-y-3">
      <input x-model="userName" placeholder="이름" class="w-full h-[50px] px-4 bg-g-100 rounded-xl text-[15px] placeholder-g-400">
      <input x-model="userCode" placeholder="인증번호 4자리" maxlength="4" inputmode="numeric" class="w-full h-[50px] px-4 bg-g-100 rounded-xl text-[15px] placeholder-g-400">
      <p x-show="loginErr" x-text="loginErr" class="text-xs text-red-500 text-center"></p>
    </div>
    <button @click="doLogin()" class="w-full h-[50px] mt-4 bg-nv-600 text-white rounded-xl font-bold text-[15px] active:bg-nv-700">로그인</button>
    <div class="flex items-center justify-center gap-4 mt-5 text-[13px] text-g-400">
      <span class="cursor-pointer" @click="toast('카카오 알림톡으로 인증번호를 발송했습니다')">인증번호 찾기</span>
      <span class="text-g-300">|</span>
      <span class="cursor-pointer" @click="toast('카카오톡 상담으로 연결됩니다')">수강 문의</span>
    </div>
  </div>
  <p class="text-center text-[10px] text-g-300 pb-6">케빈샘AI코딩 · 안산선부캠퍼스</p>
</div>
</template>

<!-- ===== 2. 홈 ===== -->
<template x-if="p==='home'">
<div class="min-h-screen bg-g-100 pb-20 fade">
  <div class="bg-nv-600 text-white px-5 pt-5 pb-8 rounded-b-[28px]">
    <div class="flex items-center justify-between mb-5">
      <div><p class="text-nv-200 text-[12px]">안녕하세요</p><h2 class="text-[20px] font-bold mt-0.5" x-text="userName+'님'"></h2></div>
      <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold text-sm" x-text="userName[0]"></div>
    </div>
    <div class="bg-white/15 rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3"><span class="text-nv-100 text-[12px]">남은 수업</span><span class="text-white/70 text-[12px]">안산선부캠퍼스</span></div>
      <div class="flex items-end gap-2">
        <span class="text-[42px] font-extrabold leading-none" x-text="remaining"></span><span class="text-[14px] text-nv-100 pb-1.5">회</span>
        <div class="flex-1"></div>
        <button @click="go('booking')" class="h-10 px-5 bg-white text-nv-700 rounded-xl font-bold text-[13px] active:scale-[.97]">예약하기</button>
      </div>
    </div>
  </div>
  <div class="px-4 -mt-3 space-y-4">
    <div class="card p-4 grid grid-cols-4 gap-1 fade s1">
      <button @click="go('booking')" class="flex flex-col items-center gap-1.5 py-2"><div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg></div><span class="text-[11px] text-g-600">수업예약</span></button>
      <button @click="go('dash')" class="flex flex-col items-center gap-1.5 py-2"><div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="3" y="12" width="4" height="9" rx="1"/><rect x="10" y="7" width="4" height="14" rx="1"/><rect x="17" y="3" width="4" height="18" rx="1"/></svg></div><span class="text-[11px] text-g-600">학습현황</span></button>
      <button @click="go('msg')" class="flex flex-col items-center gap-1.5 py-2 relative"><div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div><div x-show="unreadTotal>0" class="absolute top-1 right-3 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white font-bold flex items-center justify-center" x-text="unreadTotal"></div><span class="text-[11px] text-g-600">메시지</span></button>
      <button @click="go('pay')" class="flex flex-col items-center gap-1.5 py-2"><div class="w-11 h-11 bg-g-50 rounded-xl ic"><svg width="22" height="22" viewBox="0 0 24 24" stroke="#616161" stroke-width="1.5"><rect x="2" y="5" width="20" height="14" rx="3"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div><span class="text-[11px] text-g-600">수강/결제</span></button>
    </div>
    <div class="fade s2">
      <div class="flex justify-between items-center mb-2 px-1"><h3 class="text-[14px] font-bold text-g-800">다가오는 수업</h3><a @click="go('mybk')" class="text-[12px] text-nv-600 cursor-pointer font-medium">전체 &rsaquo;</a></div>
      <template x-if="upcomingBookings.length"><div class="card p-4"><div class="flex items-center gap-3" x-data="{b:upcomingBookings[0]}"><div class="w-12 h-12 bg-nv-50 rounded-xl flex flex-col items-center justify-center"><span class="text-[10px] text-nv-500" x-text="b.mo+'월'"></span><span class="text-[16px] font-extrabold text-nv-700 -mt-0.5" x-text="b.dy"></span></div><div class="flex-1"><p class="text-[14px] font-bold text-g-800" x-text="b.te+' 선생님'"></p><p class="text-[12px] text-g-400" x-text="b.tm+' · '+b.dn+'요일'"></p></div><span class="text-[11px] font-bold text-nv-600 bg-nv-50 px-3 py-1 rounded-full" x-text="'D-'+b.dd"></span></div></div></template>
      <template x-if="!upcomingBookings.length"><div class="card p-4 text-center text-g-400 text-sm py-8">예약된 수업이 없습니다<br><a @click="go('booking')" class="mt-2 inline-block text-nv-600 font-medium text-[13px] cursor-pointer">수업 예약하기 &rsaquo;</a></div></template>
    </div>
    <a @click="go('notice')" class="block fade s3 cursor-pointer"><div class="bg-amber-50 rounded-2xl p-4 flex items-center gap-3"><div class="w-9 h-9 bg-amber-100 rounded-lg ic flex-shrink-0"><svg width="18" height="18" viewBox="0 0 24 24" stroke="#92400E" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></div><div class="flex-1"><p class="text-[13px] font-bold text-g-800" x-text="notices[0].title"></p><p class="text-[11px] text-g-500 mt-0.5" x-text="notices[0].summary"></p></div><span class="text-g-300">&rsaquo;</span></div></a>
    <div class="fade s4">
      <div class="flex justify-between items-center mb-2 px-1"><h3 class="text-[14px] font-bold text-g-800">내 예약</h3><a @click="go('mybk')" class="text-[12px] text-nv-600 cursor-pointer font-medium">전체 &rsaquo;</a></div>
      <template x-if="upcomingBookings.length"><div class="card divide-y divide-g-200"><template x-for="b in upcomingBookings.slice(0,2)" :key="b.idx"><div class="p-4 flex items-center gap-3"><div class="w-10 h-10 bg-nv-50 rounded-lg flex flex-col items-center justify-center"><span class="text-[9px] text-nv-500" x-text="b.mo+'월'"></span><span class="text-[14px] font-extrabold text-nv-700 -mt-0.5" x-text="b.dy"></span></div><div class="flex-1"><p class="text-[13px] font-bold text-g-800" x-text="b.te+' 선생님'"></p><p class="text-[11px] text-g-400" x-text="b.tm"></p></div><span class="text-[10px] font-bold text-nv-600 bg-nv-50 px-2 py-0.5 rounded-full" x-text="'D-'+b.dd"></span></div></template></div></template>
      <template x-if="!upcomingBookings.length"><div class="card p-4 text-center text-g-400 text-sm py-6">예약된 수업이 없습니다</div></template>
    </div>
  </div>
  <div x-html="tabH()"></div>
</div>
</template>

<!-- ===== 3. 예약 ===== -->
<template x-if="p==='booking'">
<div class="min-h-screen bg-g-100 pb-24 fade">
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30">
    <button @click="bkBack()" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="text-[16px] font-bold text-g-800 flex-1" x-text="bkTitle"></h1><span class="text-[12px] text-nv-600 font-bold" x-text="bkNum"></span>
  </div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500 transition-all duration-500" :style="'width:'+bkProg+'%'"></div></div>
  <div class="px-4 pt-4 space-y-3">
    <div class="flex items-center gap-2 px-1"><span class="text-[11px] font-bold text-nv-600 bg-nv-50 px-2.5 py-1 rounded-full" x-text="'남은 수업 '+remaining+'회'"></span></div>
    <div class="card overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-g-100">
        <button @click="cmv(-1)" class="w-8 h-8 bg-g-100 rounded-lg ic text-g-500 active:bg-g-200"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span class="font-bold text-g-800" x-text="cy+'년 '+(cmo+1)+'월'"></span>
        <button @click="cmv(1)" class="w-8 h-8 bg-g-100 rounded-lg ic text-g-500 active:bg-g-200"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="p-3"><div class="grid grid-cols-7 text-center mb-1"><template x-for="d in '일월화수목금토'.split('')"><span class="text-[11px] font-medium py-1" :class="d==='일'?'text-red-400':d==='토'?'text-blue-400':'text-g-400'" x-text="d"></span></template></div>
      <div class="grid grid-cols-7 gap-1"><template x-for="c in calCells" :key="c.k"><button @click="c.a&&pickDate(c.d)" class="aspect-square flex items-center justify-center rounded-full text-[13px] transition" :class="{'bg-nv-500 text-white font-bold shadow-md':c.d===sd?.d,'bg-nv-50 text-nv-700 font-medium':c.a&&c.d!==sd?.d,'text-g-300':!c.a&&c.d>0}" x-text="c.d>0?c.d:''"></button></template></div></div>
    </div>
    <template x-if="sd&&st===null"><div class="space-y-2 fade"><h3 class="text-[14px] font-bold text-g-800 px-1" x-text="(sd.m+1)+'/'+sd.d+' 시간 선택'"></h3>
      <template x-for="(s,i) in tSlots" :key="i"><button @click="s.c>0&&pickTime(i)" class="w-full card px-4 py-3.5 flex items-center justify-between active:bg-g-50 transition" :class="!s.c&&'opacity-30 cursor-default'">
        <div class="flex items-center gap-3"><div class="w-8 h-8 bg-g-50 rounded-lg ic"><svg width="16" height="16" viewBox="0 0 24 24" stroke="#757575" stroke-width="1.5" fill="none"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><p class="text-[15px] font-bold text-g-800" x-text="s.t"></p><p class="text-[11px] text-g-400 mt-0.5" x-text="s.c>0?'예약 가능':'마감'"></p></div></div>
        <span class="text-[11px] font-bold px-3 py-1 rounded-full" :class="s.c>0?'bg-nv-50 text-nv-600':'bg-g-100 text-g-400'" x-text="s.c>0?'강사 '+s.c+'명':'마감'"></span>
      </button></template>
    </div></template>
    <template x-if="st!==null&&ste===null"><div class="space-y-2 fade"><h3 class="text-[14px] font-bold text-g-800 px-1">강사 선택</h3>
      <template x-for="(t,i) in avT" :key="t.id"><button @click="pickTeacher(i)" class="w-full card p-4 flex items-center gap-3 active:bg-g-50 transition" :class="ste===i&&'ring-2 ring-nv-400'">
        <div class="w-12 h-12 bg-g-100 rounded-full flex items-center justify-center font-extrabold text-g-600 text-lg" x-text="t.ini"></div>
        <div class="flex-1 text-left"><p class="text-[14px] font-bold text-g-800" x-text="t.n+' 선생님'"></p><p class="text-[12px] text-g-400" x-text="t.f"></p><span x-show="t.tag" class="inline-block mt-1 text-[10px] font-bold bg-g-100 text-g-600 px-2 py-0.5 rounded" x-text="t.tag"></span></div>
        <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center text-[10px]" :class="ste===i?'bg-nv-500 border-nv-500 text-white':'border-g-300'"><span x-show="ste===i">✓</span></div>
      </button></template>
    </div></template>
    <template x-if="ste!==null"><div class="bg-nv-50 rounded-xl p-4 flex items-center gap-3 fade"><div class="w-10 h-10 bg-nv-100 rounded-full flex items-center justify-center font-bold text-nv-700" x-text="avT[ste].ini"></div><div><p class="text-sm font-bold text-nv-800" x-text="avT[ste].n+' 선생님'"></p><p class="text-xs text-nv-500" x-text="(sd.m+1)+'/'+sd.d+' '+tSlots[st].t"></p></div></div></template>
  </div>
  <div class="fixed bottom-[66px] left-1/2 -translate-x-1/2 w-full max-w-[430px] px-4 pb-3 pt-3 bg-gradient-to-t from-g-100 via-g-100 z-20"><button @click="ste!==null&&go('repeat')" :disabled="ste===null" class="w-full h-[50px] rounded-xl font-bold text-[15px] transition active:scale-[.98]" :class="ste!==null?'bg-nv-600 text-white':'bg-g-200 text-g-400'" x-text="ste!==null?'다음 단계 →':'강사를 선택하세요'"></button></div>
  <div x-html="tabH()"></div>
</div>
</template>

<!-- ===== 4. 반복예약 ===== -->
<template x-if="p==='repeat'">
<div class="min-h-screen bg-g-100 pb-24 fade">
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200 sticky top-0 z-30"><button @click="go('booking')" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button><h1 class="text-[16px] font-bold text-g-800 flex-1">반복 예약</h1><span class="text-[12px] text-nv-600 font-bold">5/7</span></div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500" style="width:71%"></div></div>
  <div class="px-4 pt-4 space-y-4">
    <div><h2 class="text-[18px] font-bold text-g-900">매주 같은 시간에<br>추가 예약하시겠어요?</h2><p class="text-[13px] text-g-400 mt-1">최대 12주, 잔여 횟수 이내</p></div>
    <div class="bg-nv-50 rounded-xl p-3 flex items-center gap-3"><span class="text-[11px] font-bold text-nv-600">남은 수업</span><span class="text-[14px] font-extrabold text-nv-700" x-text="remaining+'회'"></span><span class="text-[12px] text-g-400 ml-auto" x-text="'선택: '+rSel.length+'회'"></span></div>
    <div class="space-y-1.5"><template x-for="(w,i) in rWeeks" :key="i">
      <button @click="togRep(i)" class="w-full flex items-center gap-3 bg-white rounded-xl px-4 py-3 shadow-sm transition active:scale-[.98]" :class="{'ring-2 ring-nv-400 bg-nv-50':i===0,'ring-2 ring-nv-300 bg-nv-50':rSel.includes(i)&&i!==0,'opacity-30 cursor-default':w.dis}">
        <div class="w-5 h-5 rounded-md border-2 flex items-center justify-center text-[10px]" :class="{'bg-nv-500 border-nv-500 text-white':i===0||rSel.includes(i),'border-g-300':!rSel.includes(i)&&i!==0}"><span x-show="i===0||rSel.includes(i)">✓</span></div>
        <span class="flex-1 text-left text-[13px] font-medium text-g-700" x-text="w.lb"></span>
        <span class="text-[10px] font-bold" :class="{'text-nv-600':i===0,'text-nv-500':rSel.includes(i)&&i!==0,'text-red-400':w.dis,'text-g-300':!rSel.includes(i)&&!w.dis&&i!==0}" x-text="i===0?'기본':(w.dis?'마감':(rSel.includes(i)?'선택됨':'선택'))"></span>
      </button>
    </template></div>
    <p class="text-center text-[13px] text-g-400">총 <strong class="text-nv-600" x-text="rSel.length+'회'"></strong> 예약 · 잔여 <strong class="text-nv-600" x-text="(remaining-rSel.length)+'회'"></strong></p>
  </div>
  <div class="fixed bottom-[66px] left-1/2 -translate-x-1/2 w-full max-w-[430px] px-4 pb-3 pt-3 bg-gradient-to-t from-g-100 via-g-100 z-20"><div class="flex gap-2"><button @click="rSel=[0];go('confirm')" class="flex-1 h-[50px] bg-g-200 rounded-xl font-bold text-[14px] text-g-500 active:bg-g-300">1회만 예약</button><button @click="go('confirm')" class="flex-1 h-[50px] bg-nv-600 text-white rounded-xl font-bold text-[14px] active:bg-nv-700">선택 완료</button></div></div>
  <div x-html="tabH()"></div>
</div>
</template>

<!-- ===== 5. 예약확인 ===== -->
<template x-if="p==='confirm'">
<div class="min-h-screen bg-g-100 pb-24 fade">
  <div class="bg-white px-4 pt-4 pb-3 flex items-center gap-3 border-b border-g-200"><button @click="go('repeat')" class="back-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg></button><h1 class="text-[16px] font-bold text-g-800 flex-1">예약 확인</h1><span class="text-[12px] text-nv-600 font-bold">6/7</span></div>
  <div class="h-1 bg-g-200"><div class="h-full bg-nv-500" style="width:85%"></div></div>
  <div class="px-4 pt-4"><div class="card overflow-hidden">
